<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Veya</title>
  <link rel="stylesheet" href="/styles.css">
  <script>
    // usernode-dev-console@1
    (function() {
      var levels = ['log','info','warn','error'];
      levels.forEach(function(level) {
        var orig = console[level].bind(console);
        console[level] = function() {
          orig.apply(console, arguments);
          try {
            window.parent.postMessage({ type: 'console', level: level, args: Array.from(arguments).map(function(a){ try { return JSON.stringify(a); } catch(e) { return String(a); } }) }, '*');
          } catch(e) {}
        };
      });
      window.addEventListener('error', function(e) {
        try { window.parent.postMessage({ type: 'console', level: 'error', args: [e.message + ' (' + e.filename + ':' + e.lineno + ')'] }, '*'); } catch(ex) {}
      });
      window.addEventListener('unhandledrejection', function(e) {
        try { window.parent.postMessage({ type: 'console', level: 'error', args: ['Unhandled promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason))] }, '*'); } catch(ex) {}
      });
    })();
  </script>
  <script>
    // Extract JWT token from URL params and store in sessionStorage
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      if (token) {
        sessionStorage.setItem('usernode_token', token);
        // Remove token from URL without reload
        var url = new URL(window.location.href);
        url.searchParams.delete('token');
        history.replaceState({}, '', url.toString());
      }
      window.__TOKEN__ = sessionStorage.getItem('usernode_token') || '';
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>
  <script src="https://social-vibecoding.usernodelabs.org/usernode-bridge/v1/bridge.js"></script>
  <script src="/app.js"></script>
</body>
</html>
